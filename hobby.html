<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Hobbies</title>
</head>
<body class="body">
    <h1 class="center">I love capybaras</h1>
    <div class="container">
        <img id="capybara1" class="item grow" src="capybara1.webp" alt="Two small and one big capybara" width="300" height="300">
        <img id="capybara2" class="item grow" src="capybara2.jpg" alt="Staring capybara" width="25" height="300">
        <img id="capybara3" class="item grow" src="capybara3.webp" alt="A family of capybaras" width="50" height="300">
        <img id="capybara4" class="item grow" src="capybara4.avif" alt="A large white capybara with two baby capybaras" width="100" height="300">
        <img id="capybara5" class="item grow" src="capybara5.jpg" alt="A painter capybara" width="50" height="300">
        <img id="capybara6" class="item grow" src="capybara6.jpg" alt="Capybara in the pool with a rubber duck on its head" width="100" height="300">
    </div>
    <p>Which capybara image is your favorite?</p>
    <form>
        <input type="radio" id="c1" name="fav_capybara" value="Capybara 1">
        <label for="c1">Capybara 1</label><br>
        <input type="radio" id="c2" name="fav_capybara" value="Capybara 2">
        <label for="c2">Capybara 2</label><br>
        <input type="radio" id="c3" name="fav_capybara" value="Capybara 3">
        <label for="c3">Capybara 3</label><br>
        <input type="radio" id="c4" name="fav_capybara" value="Capybara 4">
        <label for="c4">Capybara 4</label><br>
        <input type="radio" id="c5" name="fav_capybara" value="Capybara 5">
        <label for="c5">Capybara 5</label><br>
        <input type="radio" id="c6" name="fav_capybara" value="Capybara 6">
        <label for="c6">Capybara 6</label><br>
        <input type="Submit" value="Submit">
    </form>
    <video width="360" height="640" controls>
        <source src="videoplayback.mp4" type="video/mp4">
    </video>
    <a href="index.html">
    <p>Back to main page</p>
  </a>
